version: 2

updates:
  - package-ecosystem: npm
    directory: /09-learnbyplay
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      dev-tooling:
        patterns:
          - "eslint"
          - "typescript"
          - "@types/node"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
